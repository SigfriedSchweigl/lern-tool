<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Java Lern-Tool</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      margin: 0;
      padding: 40px 20px;
      color: #1e293b;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    h1, h2 {
      margin-top: 0;
    }

    .intro {
      margin-bottom: 24px;
      color: #475569;
    }

    .selector {
      margin-bottom: 24px;
    }

    select, textarea {
      padding: 10px 12px;
      font-size: 15px;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      width: 100%;
      box-sizing: border-box;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .task-box {
      background: #eef4ff;
      border-left: 5px solid #2563eb;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 24px;
    }

    .controls {
      margin-bottom: 20px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      margin-right: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #1d4ed8;
    }

    .step {
      display: none;
      padding: 14px 16px;
      border-radius: 8px;
      margin-top: 14px;
      line-height: 1.6;
    }

    .hint {
      background: #fff7d6;
    }

    .strategy {
      background: #e0f2fe;
    }

    .code {
      background: #f1f5f9;
      font-family: Consolas, monospace;
      white-space: pre-wrap;
    }

    .solution {
      background: #e8f7e8;
      font-family: Consolas, monospace;
      white-space: pre-wrap;
    }

    .example, .evaluation, .result-box {
      margin-top: 22px;
      padding: 14px 16px;
      background: #f8fafc;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
    }

    .progress {
      margin-top: 20px;
      font-size: 14px;
      color: #475569;
    }

    .radio-group {
      margin-top: 10px;
      line-height: 1.9;
    }

    .hidden {
      display: none;
    }

    code {
      background: #eff6ff;
      padding: 2px 5px;
      border-radius: 4px;
    }

    .small {
      font-size: 14px;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Java Lern-Tool</h1>
      <div class="intro">
        Wähle eine Aufgabe aus, arbeite dich mit <strong>Nächster Schritt</strong> durch die Hilfestufen und reflektiere danach deinen Lernprozess.
      </div>

      <div class="selector">
        <label for="taskSelect"><strong>Aufgabe wählen:</strong></label><br><br>
        <select id="taskSelect" onchange="changeTask()">
          <option value="max">1. Maximum in einem Array finden</option>
          <option value="even">2. Prüfen, ob eine Zahl gerade ist</option>
          <option value="sum">3. Summe eines Arrays berechnen</option>
        </select>
      </div>

      <div class="task-box" id="taskDescription"></div>

      <div class="controls">
        <button onclick="nextStep()">Nächster Schritt</button>
        <button onclick="resetSteps()">Zurücksetzen</button>
      </div>

      <div id="step1" class="step hint"></div>
      <div id="step2" class="step strategy"></div>
      <div id="step3" class="step code"></div>
      <div id="step4" class="step code"></div>
      <div id="step5" class="step solution"></div>

      <div class="example" id="exampleBox"></div>

      <div class="progress" id="progressText">
        Aktueller Stand: 0 von 5 Hilfestufen sichtbar
      </div>

      <div class="evaluation">
        <h2>Selbsteinschätzung</h2>
        <div class="small">Wie gut konntest du die Aufgabe selbst lösen?</div>

        <div class="radio-group">
          <label><input type="radio" name="selfRating" value="selbstständig"> Ich konnte sie selbstständig lösen.</label><br>
          <label><input type="radio" name="selfRating" value="wenig_hilfe"> Ich brauchte nur wenig Hilfe.</label><br>
          <label><input type="radio" name="selfRating" value="mehrere_hinweise"> Ich brauchte mehrere Hinweise.</label><br>
          <label><input type="radio" name="selfRating" value="musterlösung"> Ich brauchte die Musterlösung.</label>
        </div>

        <br>
        <label for="reflection"><strong>Reflexion:</strong></label><br><br>
        <textarea id="reflection" placeholder="Was war schwierig? Was hast du verstanden? Was möchtest du noch üben?"></textarea>

        <br><br>
        <button onclick="evaluateLearning()">Auswertung anzeigen</button>
      </div>

      <div id="resultBox" class="result-box hidden"></div>
    </div>
  </div>

  <script>
    const tasks = {
      max: {
        description: "<strong>Aufgabe:</strong><br>Schreibe eine Methode <code>findMax(int[] numbers)</code>, die das größte Element in einem Array zurückgibt.",
        example: "<strong>Beispiel:</strong> Für <code>{3, 8, 2, 5}</code> soll <code>8</code> zurückgegeben werden.",
        steps: [
          "<strong>Denkhinweis:</strong><br>Überlege, mit welchem Wert du den Vergleich beginnen kannst.",
          "<strong>Strategie:</strong><br>Speichere zuerst ein vorläufiges Maximum und gehe dann mit einer Schleife durch die restlichen Elemente.",
          `int max = numbers[0];`,
          `for (int i = 1; i < numbers.length; i++) {
    if (numbers[i] > max) {
        max = numbers[i];
    }
}`,
          `public static int findMax(int[] numbers) {
    int max = numbers[0];
    for (int i = 1; i < numbers.length; i++) {
        if (numbers[i] > max) {
            max = numbers[i];
        }
    }
    return max;
}`
        ]
      },

      even: {
        description: "<strong>Aufgabe:</strong><br>Schreibe eine Methode <code>isEven(int number)</code>, die prüft, ob eine Zahl gerade ist.",
        example: "<strong>Beispiel:</strong> Für <code>6</code> soll <code>true</code>, für <code>7</code> soll <code>false</code> zurückgegeben werden.",
        steps: [
          "<strong>Denkhinweis:</strong><br>Wie kannst du erkennen, ob bei einer Division durch 2 ein Rest bleibt?",
          "<strong>Strategie:</strong><br>Nutze den Modulo-Operator <code>%</code>. Eine gerade Zahl hat bei Division durch 2 den Rest 0.",
          `number % 2 == 0`,
          `if (number % 2 == 0) {
    return true;
} else {
    return false;
}`,
          `public static boolean isEven(int number) {
    return number % 2 == 0;
}`
        ]
      },

      sum: {
        description: "<strong>Aufgabe:</strong><br>Schreibe eine Methode <code>sumArray(int[] numbers)</code>, die die Summe aller Elemente eines Arrays berechnet.",
        example: "<strong>Beispiel:</strong> Für <code>{4, 1, 3}</code> soll <code>8</code> zurückgegeben werden.",
        steps: [
          "<strong>Denkhinweis:</strong><br>Du brauchst eine Variable, in der du Zwischenergebnisse speicherst.",
          "<strong>Strategie:</strong><br>Starte mit einer Summe von 0 und addiere dann in einer Schleife jedes Element dazu.",
          `int sum = 0;`,
          `for (int i = 0; i < numbers.length; i++) {
    sum += numbers[i];
}`,
          `public static int sumArray(int[] numbers) {
    int sum = 0;
    for (int i = 0; i < numbers.length; i++) {
        sum += numbers[i];
    }
    return sum;
}`
        ]
      }
    };

    let currentTask = "max";
    let currentStep = 0;
    let usedHints = 0;
    const maxSteps = 5;

    function renderTask() {
      document.getElementById("taskDescription").innerHTML = tasks[currentTask].description;
      document.getElementById("exampleBox").innerHTML = tasks[currentTask].example;

      for (let i = 1; i <= maxSteps; i++) {
        const stepElement = document.getElementById("step" + i);
        stepElement.innerHTML = tasks[currentTask].steps[i - 1];
        stepElement.style.display = "none";
      }

      document.getElementById("step1").className = "step hint";
      document.getElementById("step2").className = "step strategy";
      document.getElementById("step3").className = "step code";
      document.getElementById("step4").className = "step code";
      document.getElementById("step5").className = "step solution";

      currentStep = 0;
      usedHints = 0;
      document.getElementById("reflection").value = "";
      clearRating();
      hideResult();
      updateProgress();
    }

    function changeTask() {
      currentTask = document.getElementById("taskSelect").value;
      renderTask();
    }

    function nextStep() {
      if (currentStep < maxSteps) {
        currentStep++;
        usedHints++;
        document.getElementById("step" + currentStep).style.display = "block";
        updateProgress();
      }
    }

    function resetSteps() {
      for (let i = 1; i <= maxSteps; i++) {
        document.getElementById("step" + i).style.display = "none";
      }
      currentStep = 0;
      usedHints = 0;
      clearRating();
      document.getElementById("reflection").value = "";
      hideResult();
      updateProgress();
    }

    function updateProgress() {
      document.getElementById("progressText").textContent =
        "Aktueller Stand: " + currentStep + " von 5 Hilfestufen sichtbar";
    }

    function getSelectedRating() {
      const ratings = document.getElementsByName("selfRating");
      for (let i = 0; i < ratings.length; i++) {
        if (ratings[i].checked) {
          return ratings[i].value;
        }
      }
      return null;
    }

    function getRatingText(value) {
      switch (value) {
        case "selbstständig":
          return "Ich konnte sie selbstständig lösen.";
        case "wenig_hilfe":
          return "Ich brauchte nur wenig Hilfe.";
        case "mehrere_hinweise":
          return "Ich brauchte mehrere Hinweise.";
        case "musterlösung":
          return "Ich brauchte die Musterlösung.";
        default:
          return "Keine Auswahl getroffen.";
      }
    }

    function evaluateLearning() {
      const rating = getSelectedRating();
      const reflection = document.getElementById("reflection").value.trim();
      const resultBox = document.getElementById("resultBox");

      resultBox.classList.remove("hidden");

      let feedback = "";

      feedback += "<h2>Auswertung</h2>";
      feedback += "<p><strong>Gewählte Aufgabe:</strong> " + document.getElementById("taskSelect").selectedOptions[0].text + "</p>";
      feedback += "<p><strong>Genutzte Hilfestufen:</strong> " + usedHints + " von 5</p>";
      feedback += "<p><strong>Selbsteinschätzung:</strong> " + getRatingText(rating) + "</p>";

      if (reflection.length > 0) {
        feedback += "<p><strong>Reflexion:</strong><br>" + reflection.replace(/\n/g, "<br>") + "</p>";
      } else {
        feedback += "<p><strong>Reflexion:</strong><br>Keine Reflexion eingetragen.</p>";
      }

      if (usedHints <= 1) {
        feedback += "<p><strong>Rückmeldung:</strong> Sehr gut – du konntest die Aufgabe fast ohne Unterstützung bearbeiten.</p>";
      } else if (usedHints <= 3) {
        feedback += "<p><strong>Rückmeldung:</strong> Gut – du hast die Aufgabe mit gezielten Hinweisen bearbeitet.</p>";
      } else {
        feedback += "<p><strong>Rückmeldung:</strong> Die Aufgabe war noch anspruchsvoll. Das ist in Ordnung – die Hinweise helfen dir beim schrittweisen Aufbau des Verständnisses.</p>";
      }

      resultBox.innerHTML = feedback;
    }

    function clearRating() {
      const ratings = document.getElementsByName("selfRating");
      for (let i = 0; i < ratings.length; i++) {
        ratings[i].checked = false;
      }
    }

    function hideResult() {
      const resultBox = document.getElementById("resultBox");
      resultBox.classList.add("hidden");
      resultBox.innerHTML = "";
    }

    renderTask();
  </script>
</body>
</html>
